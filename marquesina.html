<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Marquesina JS</title>

    <!-- 👇 CONECTAR CSS -->
    <link rel="stylesheet" href="mi_estilo.css">
</head>

<body>

<header>
    <h1>Marquesina con JavaScript 🚀</h1>
</header>

<div class="container">

    <div class="card">
        <h2 id="mensaje"></h2>
    </div>

</div>

<footer>
    <p>© 2026 Equipo JavaScript</p>
</footer>

<script>
    let texto = "Bienvenido a nuestro portafolio JavaScript 🚀   ";

    function moverTexto() {
        texto = texto.substring(1) + texto.charAt(0);
        document.getElementById("mensaje").textContent = texto;
    }

    setInterval(moverTexto, 200);
</script>

</body>
</html>
